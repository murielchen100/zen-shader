<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to the Zen space</title>
    <!-- 引入極簡網頁排版庫 Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- 引入網頁 3D/Shader 庫 Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; background: #000; font-family: sans-serif; }
        #webgl-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        /* 互動 UI 容器：疊在畫布最上層 */
        #ui-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.8); }
        /* 雲朵般輕微浮動的動態效果 */
        .cloud-box { animation: floatMotion 4s ease-in-out infinite; transition: opacity 0.6s ease, transform 0.6s ease; }
        @keyframes floatMotion {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
    </style>
</head>
<body>

    <!-- 底層：Shader 的畫布 -->
    <canvas id="webgl-canvas"></canvas>

    <!-- 上層：問答導引字卡 -->
    <div id="ui-container">
        <div id="dialog-card" class="cloud-box bg-white/10 backdrop-blur-xl p-8 rounded-2xl max-w-md w-full text-center text-white border border-white/10 shadow-2xl mx-4">
            <div id="content-area"></div>
        </div>
    </div>

    <!-- 右下角下載按鈕：30秒錄影完畢後會解鎖變綠 -->
    <a id="download-btn" style="display: none;" class="fixed bottom-6 right-6 z-50 bg-gray-600 text-white font-medium py-3 px-6 rounded-xl shadow-2xl pointer-events-none flex items-center gap-2 transition-all duration-500">
        ⏳ Generating your video...
    </a>

    <script>
        let scene, camera, renderer, material;
        let animationFrameId;
        
        // 儲存測驗答案的參數
        let userChoices = {
            delta: 2.0,
            beta: 40.0,
            paletteType: 1.0,  
            patternType: 0.0   
        };

        let shaderUniforms = {
            iTime: { value: 0 },
            iResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
            uDeltaFreq: { value: 2.0 }, 
            uBetaFreq: { value: 40.0 },
            uPaletteType: { value: 1.0 },
            uPatternType: { value: 0.0 },
            uStarted: { value: 0.0 } // 預設 0.0 畫面全黑
        };

        // 支援多重花紋與調色盤的 GLSL Shader
        const fragmentShaderSource = `
            uniform float iTime;
            uniform vec2 iResolution;
            uniform float uDeltaFreq;
            uniform float uBetaFreq;
            uniform float uPaletteType;
            uniform float uPatternType;
            uniform float uStarted; 

            vec3 palette( float t, float type ){ 
                vec3 a = vec3(1.248, 0.5, 0.5);
                vec3 b = vec3(-0.042, 0.5, 0.5);
                vec3 c = vec3(1.0, 1.0, 1.0);
                vec3 d = vec3(0.0, 0.333, 0.667);
                
                if(type > 1.5 && type < 2.5) { // Palette 2
                    a = vec3(0.8, 0.4, 0.2); b = vec3(0.2, 0.4, 0.2); c = vec3(2.0, 1.0, 1.0); d = vec3(0.0, 0.25, 0.25);
                } else if(type > 2.5) { // Palette 3
                    a = vec3(0.2, 0.5, 0.7); b = vec3(0.4, 0.2, 0.2); c = vec3(1.0, 1.0, 1.0); d = vec3(0.0, 0.1, 0.3);
                }
                return a + b*cos( 6.283185*(c*t+d) );
            }

            void mainImage( out vec4 fragColor, in vec2 fragCoord )
            {
                if (uStarted < 0.5) {
                    fragColor = vec4(0.0, 0.0, 0.0, 1.0);
                    return;
                }

                vec2 uv_center = (fragCoord * 2.0 - iResolution.xy) / iResolution.y;
                vec2 uv_bg = fragCoord / iResolution.xy;

                float bg_t = uv_bg.x * 0.1 + uv_bg.y * 0.1 + iTime * 0.2;
                vec3 backgroundColor = palette(bg_t, uPaletteType);

                vec2 symmetric_uv = abs(uv_center);
                vec2 r_uv = symmetric_uv - vec2(1.7, 1.0);
                
                float r = length(r_uv);
                float angle = atan(r_uv.y, r_uv.x);
                
                // 根據 Option 3 選擇切換圖案 (Flower / Leave / Color Pattern)
                float patternModifier = 1.0;
                if(uPatternType > 0.5 && uPatternType < 1.5) {
                    patternModifier = 1.0 + 0.3 * cos(angle * 5.0); // 🌸 Flower Pattern
                } else if(uPatternType > 1.5) {
                    patternModifier = 1.0 + 0.4 * abs(sin(angle * 2.0)) * exp(-symmetric_uv.x); // 🌿 Leave Pattern
                } else {
                    patternModifier = 1.0 + 0.2 * cos(angle * 4.0); // ⭐ Color Palette Shader 預設幾何
                }
                
                float base_d = r * patternModifier;

                float delta = sin(base_d * uDeltaFreq - iTime * 1.5) * 0.3; 
                float beta  = sin(base_d * uBetaFreq + iTime * 12.0) * 0.05; 
                
                float wave = abs(delta + beta);
                float final_glow = 0.005 / (wave + 0.001);
                final_glow *= exp(-base_d * 0.2);

                float rippleMixControl = clamp(final_glow, 0.0, 1.0);
                vec3 rippleColor = palette(iTime * 0.1 + 0.5, uPaletteType); 

                vec3 finalColor = mix(backgroundColor, rippleColor, rippleMixControl);
                fragColor = vec4(finalColor, 1.0);
            }

            void main() {
                mainImage(gl_FragColor, gl_FragCoord.xy);
            }
        `;

        // --- 中性自然語感：Miro 流程狀態機管理系統 ---
        let currentStep = 1;
        const htmlContent = document.getElementById('content-area');
        const cardNode = document.getElementById('dialog-card');

        function updateFlow() {
            cardNode.style.opacity = '0';
            cardNode.style.transform = 'scale(0.98)';
            
            setTimeout(() => {
                switch(currentStep) {
                    case 1: // Output 1
                        htmlContent.innerHTML = `<h2 class="text-2xl font-medium tracking-wide">Hello there...</h2>`;
                        cardNode.style.opacity = '1'; cardNode.style.transform = 'scale(1)';
                        setTimeout(() => { currentStep = 2; updateFlow(); }, 2000);
                        break;
                    case 2: // Output 2
                        htmlContent.innerHTML = `<h2 class="text-2xl font-medium tracking-wide">How's your day going?</h2>`;
                        cardNode.style.opacity = '1'; cardNode.style.transform = 'scale(1)';
                        setTimeout(() => { currentStep = 3; updateFlow(); }, 2000);
                        break;
                    case 3: // Output 3
                        htmlContent.innerHTML = `<h2 class="text-xl text-gray-200 leading-relaxed">Take a moment to check in with yourself...</h2>`;
                        cardNode.style.opacity = '1'; cardNode.style.transform = 'scale(1)';
                        setTimeout(() => { currentStep = 4; updateFlow(); }, 2000);
                        break;
                    case 4: // Option 1 (綁定腦波頻率)
                        htmlContent.innerHTML = `
                            <h3 class="text-base font-semibold text-gray-400 mb-5">How are you feeling right now?</h3>
                            <div class="space-y-3">
                                <button onclick="selectMood(10.0, 15.0)" class="w-full bg-white/10 hover:bg-white/20 text-white py-3 px-4 rounded-xl transition cursor-pointer border border-white/5 text-left pl-6">1. Calm and relaxed</button>
                                <button onclick="selectMood(6.0, 10.0)" class="w-full bg-white/10 hover:bg-white/20 text-white py-3 px-4 rounded-xl transition cursor-pointer border border-white/5 text-left pl-6">2. A bit tired or stressed</button>
                                <button onclick="selectMood(20.0, 40.0)" class="w-full bg-white/10 hover:bg-white/20 text-white py-3 px-4 rounded-xl transition cursor-pointer border border-white/5 text-left pl-6">3. Energized and motivated</button>
                            </div>`;
                        cardNode.style.opacity = '1'; cardNode.style.transform = 'scale(1)';
                        break;
                    case 5: // Output 4
                        htmlContent.innerHTML = `<h2 class="text-xl font-medium text-gray-200">What are your plans for the rest of the day?</h2>`;
                        cardNode.style.opacity = '1'; cardNode.style.transform = 'scale(1)';
                        setTimeout(() => { currentStep = 6; updateFlow(); }, 2000);
                        break;
                    case 6: // Option 2 (綁定 Color Palette)
                        htmlContent.innerHTML = `
                            <h3 class="text-base font-semibold text-gray-400 mb-5">Your next plan:</h3>
                            <div class="space-y-3">
                                <button onclick="selectPalette(1.0)" class="w-full bg-white/10 hover:bg-white/20 text-white py-3 px-4 rounded-xl transition cursor-pointer border border-white/5 text-left pl-6">1. Just unwind and chill</button>
                                <button onclick="selectPalette(2.0)" class="w-full bg-white/10 hover:bg-white/20 text-white py-3 px-4 rounded-xl transition cursor-pointer border border-white/5 text-left pl-6">2. Do something fun</button>
                                <button onclick="selectPalette(3.0)" class="w-full bg-white/10 hover:bg-white/20 text-white py-3 px-4 rounded-xl transition cursor-pointer border border-white/5 text-left pl-6">3. Stay active or go out</button>
                            </div>`;
                        cardNode.style.opacity = '1'; cardNode.style.transform = 'scale(1)';
                        break;
                    case 7: // Option 3 (圖案：Flower / Leave / Color Shader)
                        htmlContent.innerHTML = `
                            <h3 class="text-base font-semibold text-gray-400 mb-5">Pick a visual pattern that catches your eye:</h3>
                            <div class="grid grid-cols-3 gap-4">
                                <button onclick="selectPattern(1.0)" class="text-3xl bg-white/10 hover:bg-white/20 p-4 rounded-xl transition cursor-pointer border border-white/5">🌸</button>
                                <button onclick="selectPattern(2.0)" class="text-3xl bg-white/10 hover:bg-white/20 p-4 rounded-xl transition cursor-pointer border border-white/5">🌿</button>
                                <button onclick="selectPattern(0.0)" class="text-3xl bg-white/10 hover:bg-white/20 p-4 rounded-xl transition cursor-pointer border border-white/5">⭐</button>
                            </div>`;
                        cardNode.style.opacity = '1'; cardNode.style.transform = 'scale(1)';
                        break;
                    case 8: // Output 5
                        htmlContent.innerHTML = `<h2 class="text-xl text-cyan-300 animate-pulse tracking-wide">Generating your custom audio-visual gift...</h2>`;
                        cardNode.style.opacity = '1'; cardNode.style.transform = 'scale(1)';
                        setTimeout(() => { currentStep = 9; updateFlow(); }, 3000); 
                        break;
                    case 9: // Output 6
                        htmlContent.innerHTML = `<h2 class="text-2xl font-bold text-green-400">Here is your space. Enjoy.</h2>`;
                        cardNode.style.opacity = '1'; cardNode.style.transform = 'scale(1)';
                        
                        // 2秒後 UI 框完美消失，Shader 啟動並錄影
                        setTimeout(() => {
                            document.getElementById('ui-container').style.display = 'none';
                            
                            // 將記錄下來的客製化測驗結果一併送進顯示卡
                            shaderUniforms.uDeltaFreq.value = userChoices.delta;
                            shaderUniforms.uBetaFreq.value = userChoices.beta;
                            shaderUniforms.uPaletteType.value = userChoices.paletteType;
                            shaderUniforms.uPatternType.value = userChoices.patternType;
                            shaderUniforms.uStarted.value = 1.0;
                            
                            // 呼叫右下角錄影機制
                            document.getElementById('download-btn').style.display = 'flex';
                            startRecordingAndDownload();
                        }, 2000);
                        break;
                }
            }, 400);
        }

        function selectMood(d, b) { userChoices.delta = d; userChoices.beta = b; currentStep = 5; updateFlow(); }
        function selectPalette(p) { userChoices.paletteType = p; currentStep = 7; updateFlow(); }
        function selectPattern(pat) { userChoices.patternType = pat; currentStep = 8; updateFlow(); }

        // --- Three.js 初始化基礎架構 ---
        function initShader() {
            const canvas = document.getElementById('webgl-canvas');
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

            material = new THREE.ShaderMaterial({
                uniforms: shaderUniforms,
                fragmentShader: fragmentShaderSource
            });

            const geometry = new THREE.PlaneGeometry(2, 2);
            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            window.addEventListener('resize', onWindowResize);
            animate(0);
            
            // 觸發狀態機
            updateFlow();
        }

        function animate(timestamp) {
            animationFrameId = requestAnimationFrame(animate);
            shaderUniforms.iTime.value = timestamp * 0.001; 
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            renderer.setSize(window.innerWidth, window.innerHeight);
            shaderUniforms.iResolution.value.set(window.innerWidth, window.innerHeight);
        }

        // --- 靜默背景 Canvas 錄影與檔案下載綁定 ---
        function startRecordingAndDownload() {
            const canvas = document.getElementById('webgl-canvas');
            const stream = canvas.captureStream(30); 
            
            let options = { mimeType: 'video/webm;codecs=vp9' };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                options = { mimeType: 'video/webm' };
            }
            
            const mediaRecorder = new MediaRecorder(stream, options);
            const chunks = [];

            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) chunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);

                const downloadBtn = document.getElementById('download-btn');
                
                // 30秒錄影結束：變綠、解鎖滑鼠點擊、跳躍動畫
                downloadBtn.className = "fixed bottom-6 right-6 z-50 bg-green-500 hover:bg-green-600 text-white font-medium py-3 px-6 rounded-xl transition shadow-2xl cursor-pointer flex items-center gap-2 pointer-events-auto animate-bounce";
                downloadBtn.innerHTML = "📥 Download Your Video (30s)";
                
                downloadBtn.onclick = (e) => {
                    e.preventDefault();
                    const tempAnchor = document.createElement('a');
                    tempAnchor.style.display = 'none';
                    tempAnchor.href = url;
                    tempAnchor.download = 'My_Custom_Space_Video.webm';
                    document.body.appendChild(tempAnchor);
                    tempAnchor.click();
                    document.body.removeChild(tempAnchor);
                };
            };

            mediaRecorder.start();

            // 錄足 30 秒自動結束
            setTimeout(() => {
                mediaRecorder.stop();
            }, 30000); 
        }

        window.onload = initShader;
    </script>
</body>
</html>
