<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; }
        #canvas { position: fixed; top:0; left:0; width:100%; height:100%; z-index:-1; }
        .dialog-box { transition: all 0.5s ease; }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="ui" class="flex justify-center items-center h-screen">
    <div id="box" class="bg-white/10 backdrop-blur-md p-8 rounded-xl border border-white/20 text-center dialog-box">
        <div id="content">Loading...</div>
    </div>
</div>

<script>
// 1. 流程控制數據
const steps = [
    { text: "Hello there ...", next: 1 },
    { text: "How's your day?", next: 2 },
    { text: "Just take a breath, and tell us ...", next: 3 },
    { text: "1. I'm good ☺ <br> 2. Just a bit tired ... <br> 3. Full of energy !!", type: 'options' },
    { text: "What are you planning to do next ?", next: 5 },
    { text: "1. Relax on my couch <br> 2. Having fun <br> 3. Party !", type: 'options' },
    { text: "Choose your visual gift:", type: 'shaders' },
    { text: "A moment before the gift ...", next: 8 },
    { text: "And here you are !", next: 9 }
];

let currentStep = 0;

// 2. 顯示內容函數
function renderStep() {
    const step = steps[currentStep];
    const content = document.getElementById('content');
    
    if(step.type === 'options') {
        content.innerHTML = step.text.split('<br>').map((t, i) => 
            `<button onclick="next(${i})" class="block w-full p-2 hover:bg-white/20">${t}</button>`).join('');
    } else if(step.type === 'shaders') {
        content.innerHTML = `
            <button onclick="applyShader('sakura')">🌸</button>
            <button onclick="applyShader('leaf')">🌿</button>
            <button onclick="applyShader('wave')">🌊</button>`;
    } else {
        content.innerHTML = `<h1>${step.text}</h1>`;
        if(step.next !== undefined) setTimeout(() => next(), 2000);
    }
}

function next(choice = null) {
    if(currentStep < steps.length - 1) {
        currentStep++;
        renderStep();
    }
}

// 3. Shader 邏輯
function applyShader(key) {
    material.fragmentShader = shaderRepository[key];
    material.needsUpdate = true;
    document.getElementById('ui').style.display = 'none'; // 隱藏 UI 開始動畫
}

// 4. Three.js 初始化
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({canvas});
renderer.setSize(window.innerWidth, window.innerHeight);
const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);
const uniforms = { iTime: {value: 0}, iResolution: {value: new THREE.Vector2(window.innerWidth, window.innerHeight)} };

const shaderRepository = {
    'sakura': `uniform float iTime; void main(){ gl_FragColor=vec4(1.0,0.5,0.7,1.0); }`,
    'leaf': `uniform float iTime; void main(){ gl_FragColor=vec4(0.2,0.8,0.2,1.0); }`,
    'wave': `uniform float iTime; void main(){ gl_FragColor=vec4(0.1,0.3,0.9,1.0); }`
};

const material = new THREE.ShaderMaterial({uniforms, fragmentShader: shaderRepository.sakura});
scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), material));

function animate(t) {
    uniforms.iTime.value = t * 0.001;
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}

renderStep();
animate(0);
</script>
</body>
</html>
