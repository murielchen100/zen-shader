<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to the Zen space</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; background: #000; font-family: sans-serif; }
        #webgl-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #ui-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.7); transition: opacity 1s ease; }
    </style>
</head>
<body>

    <canvas id="webgl-canvas"></canvas>

    <div id="ui-container">
        <div class="bg-white/10 backdrop-blur-md p-8 rounded-2xl max-w-md w-full text-center text-white border border-white/20 shadow-2xl">
            <h1 class="text-3xl font-bold mb-4">Hello, how's your day?</h1>
            <p class="text-gray-300 mb-8">Select your current mood, and we will formulate a personalized brainwave healing gift for you...</p>
            
            <div class="space-y-4">
                <button onclick="generateGift('anxious')" class="w-full bg-cyan-500 hover:bg-cyan-600 text-white font-medium py-3 px-4 rounded-xl transition shadow-lg cursor-pointer">
                    🧘‍♂️ Feeling Anxious (Tune: Deep Delta Waves)
                </button>
                <button onclick="generateGift('celebrate')" class="w-full bg-pink-500 hover:bg-pink-600 text-white font-medium py-3 px-4 rounded-xl transition shadow-lg cursor-pointer">
                    🎉 Time to Celebrate (Tune: Energetic Beta Waves)
                </button>
            </div>
            
            <div id="loading-status" class="hidden mt-6 text-cyan-300 animate-pulse">
                Packaging your exclusive energy video, please wait...
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, material;
        let animationFrameId;
        
        // 💡 這裡新增了 uStarted 變數，預設是 0.0（代表尚未啟動，顯示全黑）
        let shaderUniforms = {
            iTime: { value: 0 },
            iResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
            uDeltaFreq: { value: 2.0 }, 
            uBetaFreq: { value: 40.0 },
            uStarted: { value: 0.0 } 
        };

        const fragmentShaderSource = `
            uniform float iTime;
            uniform vec2 iResolution;
            uniform float uDeltaFreq;
            uniform float uBetaFreq;
            uniform float uStarted; // 💡 接收來自網頁的開關訊號

            vec3 palette( float t ){ 
                vec3 a = vec3(1.248, 0.5, 0.5);
                vec3 b = vec3(-0.042, 0.5, 0.5);
                vec3 c = vec3(1.0, 1.0, 1.0);
                vec3 d = vec3(0.0, 0.333, 0.667);
                return a + b*cos( 6.283185*(c*t+d) );
            }

            void mainImage( out vec4 fragColor, in vec2 fragCoord )
            {
                // 💡 核心魔術：如果 uStarted 小於 0.5，直接輸出黑色並結束計算，不再往下跑
                if (uStarted < 0.5) {
                    fragColor = vec4(0.0, 0.0, 0.0, 1.0);
                    return;
                }

                // 以下是原本絢麗的腦波 Shader 邏輯，只有在 uStarted == 1.0 時才會執行
                vec2 uv_center = (fragCoord * 2.0 - iResolution.xy) / iResolution.y;
                vec2 uv_bg = fragCoord / iResolution.xy;

                float bg_t = uv_bg.x * 0.1 + uv_bg.y * 0.1 + iTime * 0.2;
                vec3 backgroundColor = palette(bg_t);

                vec2 symmetric_uv = abs(uv_center);
                vec2 cornerTarget = vec2(1.7, 1.0);
                vec2 r_uv = symmetric_uv - cornerTarget;
                
                float r = length(r_uv);
                float angle = atan(r_uv.y, r_uv.x);
                float base_d = r * (1.0 + 0.2 * cos(angle * 4.0));

                float delta = sin(base_d * uDeltaFreq - iTime * 1.5) * 0.3; 
                float beta  = sin(base_d * uBetaFreq + iTime * 12.0) * 0.05; 
                
                float wave = abs(delta + beta);
                float final_glow = 0.005 / (wave + 0.001);
                final_glow *= exp(-base_d * 0.2);

                float rippleMixControl = clamp(final_glow, 0.0, 1.0);
                vec3 rippleColor = palette(iTime * 0.1 + 0.5); 

                vec3 finalColor = mix(backgroundColor, rippleColor, rippleMixControl);
                fragColor = vec4(finalColor, 1.0);
            }

            void main() {
                mainImage(gl_FragColor, gl_FragCoord.xy);
            }
        `;

        function initShader() {
            const canvas = document.getElementById('webgl-canvas');
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

            material = new THREE.ShaderMaterial({
                uniforms: shaderUniforms,
                fragmentShader: fragmentShaderSource
            });

            const geometry = new THREE.PlaneGeometry(2, 2);
            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            window.addEventListener('resize', onWindowResize);
            animate(0);
        }

        function animate(timestamp) {
            animationFrameId = requestAnimationFrame(animate);
            shaderUniforms.iTime.value = timestamp * 0.001;
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            renderer.setSize(window.innerWidth, window.innerHeight);
            shaderUniforms.iResolution.value.set(window.innerWidth, window.innerHeight);
        }

        function generateGift(mood) {
            // 💡 關鍵動作：使用者一點擊，立刻把開關打開（設為 1.0），背景瞬間亮起！
            shaderUniforms.uStarted.value = 1.0;

            if (mood === 'anxious') {
                shaderUniforms.uDeltaFreq.value = 1.5;  
                shaderUniforms.uBetaFreq.value = 10.0;  
            } else if (mood === 'celebrate') {
                shaderUniforms.uDeltaFreq.value = 6.0;  
                shaderUniforms.uBetaFreq.value = 60.0;  
            }

            document.getElementById('loading-status').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('ui-container').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('ui-container').style.display = 'none';
                }, 1000);
            }, 500);

            startRecordingAndDownload();
        }

        function startRecordingAndDownload() {
            const canvas = document.getElementById('webgl-canvas');
            const stream = canvas.captureStream(30); 
            const mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
            const chunks = [];

            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) chunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'Your_Brainwave_Gift.webm';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            };

            mediaRecorder.start();
            setTimeout(() => {
                mediaRecorder.stop();
            }, 5000);
        }

        window.onload = initShader;
    </script>
</body>
</html>
