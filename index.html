<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to the Zen space</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; background: #000; font-family: sans-serif; }
        #webgl-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #ui-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.8); }
        .cloud-box { animation: floatMotion 4s ease-in-out infinite; transition: opacity 0.6s ease, transform 0.6s ease; }
        @keyframes floatMotion {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
    </style>
</head>
<body>

    <canvas id="webgl-canvas"></canvas>

    <div id="ui-container">
        <div id="dialog-card" class="cloud-box bg-white/10 backdrop-blur-xl p-8 rounded-2xl max-w-md w-full text-center text-white border border-white/10 shadow-2xl mx-4">
            <div id="content-area"></div>
        </div>
    </div>

    <a id="download-btn" style="display: none;" class="fixed bottom-6 right-6 z-50 bg-gray-600 text-white font-medium py-3 px-6 rounded-xl shadow-2xl pointer-events-none flex items-center gap-2 transition-all duration-500">
        ⏳ Generating your video...
    </a>

    <script>
        let scene, camera, renderer, material;
        let animationFrameId;
        let audioCtx = null;
        let startAudioFunctions = null; 

        let userChoices = { delta: 2.0, beta: 40.0, paletteType: 1.0, patternType: 0.0 };
        let shaderUniforms = {
            iTime: { value: 0 },
            iResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
            uStarted: { value: 0.0 } 
        };

        // --- SHADER SOURCE 1: 櫻花 ---
        const fragmentShaderSakura = `
            uniform float iTime; uniform vec2 iResolution; uniform float uStarted;
            vec3 palette( float t, vec3 bias ){ vec3 a=vec3(0.5,0.5,0.5); vec3 b=vec3(0.5,0.5,0.5); vec3 c=vec3(1.0,1.0,1.0); vec3 d=vec3(0.0,0.1,0.2)+bias; return a+b*cos(6.283185*(c*t+d)); }
            void mainImage(out vec4 fragColor, in vec2 fragCoord){
                if(uStarted < 0.5){ fragColor=vec4(0.0,0.0,0.0,1.0); return; }
                vec2 uv=(fragCoord*2.0-iResolution.xy)/iResolution.y;
                vec3 col=palette(iTime*0.1, vec3(0.0));
                fragColor = vec4(col, 1.0);
            }
            void main(){ mainImage(gl_FragColor, gl_FragCoord.xy); }
        `;

        // --- SHADER SOURCE 2: 浪 ---
        const fragmentShaderWave = `
            uniform float iTime; uniform vec2 iResolution; uniform float uStarted;
            void mainImage(out vec4 fragColor, in vec2 fragCoord){
                if(uStarted < 0.5){ fragColor=vec4(0.0,0.0,0.0,1.0); return; }
                fragColor = vec4(0.0, 0.2, 0.4, 1.0);
            }
            void main(){ mainImage(gl_FragColor, gl_FragCoord.xy); }
        `;

        // --- SHADER SOURCE 3: 葉子 ---
        const fragmentShaderLeaf = `
            uniform float iTime; uniform vec2 iResolution; uniform float uStarted;
            vec3 palette(float t, vec3 bias){ vec3 a=vec3(0.5,0.5,0.5); vec3 b=vec3(0.5,0.5,0.5); vec3 c=vec3(1.0,1.0,1.0); vec3 d=vec3(0.0,0.1,0.2)+bias; return a+b*cos(6.283185*(c*t+d)); }
            void mainImage(out vec4 fragColor, in vec2 fragCoord){
                if(uStarted < 0.5){ fragColor=vec4(0.0,0.0,0.0,1.0); return; }
                float waveFreq=1.2, waveAmp=0.12, arcCurv=0.65, veinThick=0.012;
                vec2 uv_center = (fragCoord*2.0-iResolution.xy)/iResolution.y;
                vec3 rippleLayerColorSum = vec3(0.0); float total_mix_weight = 0.0;
                for(int i=0; i<4; i++){
                    float stageTime = mod(iTime*0.5, 10.0);
                    vec2 toCorner = uv_center;
                    float leaf_glow = 0.5 / (abs(sin(toCorner.x*2.0)) + 0.5);
                    rippleLayerColorSum += palette(iTime*0.1, vec3(0.0)) * leaf_glow;
                    total_mix_weight += leaf_glow;
                }
                fragColor = vec4(rippleLayerColorSum / (total_mix_weight + 0.1), 1.0);
            }
            void main(){ mainImage(gl_FragColor, gl_FragCoord.xy); }
        `;

        const shaderRepository = { 'sakura': fragmentShaderSakura, 'wave': fragmentShaderWave, 'leaf': fragmentShaderLeaf };

        let currentStep = 1;
        const htmlContent = document.getElementById('content-area');
        const cardNode = document.getElementById('dialog-card');

        function updateFlow() {
            cardNode.style.opacity = '0'; cardNode.style.transform = 'scale(0.98)';
            setTimeout(() => {
                if(currentStep === 4) {
                    htmlContent.innerHTML = `<h3 class="mb-5">How are you feeling?</h3>
                        <button onclick="selectMood(10,15,1)" class="w-full bg-white/10 p-3 mb-2 rounded">Calm</button>
                        <button onclick="selectMood(6,10,2)" class="w-full bg-white/10 p-3 mb-2 rounded">Tired</button>
                        <button onclick="selectMood(20,40,3)" class="w-full bg-white/10 p-3 rounded">Energized</button>`;
                } else if(currentStep === 7) {
                    htmlContent.innerHTML = `<h3 class="mb-5">Pick a pattern:</h3>
                        <div class="grid grid-cols-3 gap-4">
                            <button onclick="selectPattern(1,'sakura')" class="p-4 bg-white/10 rounded text-2xl">🌸</button>
                            <button onclick="selectPattern(2,'leaf')" class="p-4 bg-white/10 rounded text-2xl">🌿</button>
                            <button onclick="selectPattern(0,'wave')" class="p-4 bg-white/10 rounded text-2xl">🌊</button>
                        </div>`;
                } else if(currentStep === 9) {
                    htmlContent.innerHTML = `<h2 class="text-2xl font-bold text-green-400">Enjoy your space.</h2>`;
                    setTimeout(() => { 
                        document.getElementById('ui-container').style.display = 'none';
                        shaderUniforms.uStarted.value = 1.0;
                        startRecordingAndDownload();
                    }, 2000);
                }
                cardNode.style.opacity = '1'; cardNode.style.transform = 'scale(1)';
            }, 400);
        }

        function selectMood(d, b, i) { currentStep = 7; updateFlow(); }
        function selectPattern(p, key) { 
            material.fragmentShader = shaderRepository[key];
            material.needsUpdate = true;
            currentStep = 9; updateFlow(); 
        }

        function initShader() {
            const canvas = document.getElementById('webgl-canvas');
            renderer = new THREE.WebGLRenderer({ canvas: canvas });
            renderer.setSize(window.innerWidth, window.innerHeight);
            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            material = new THREE.ShaderMaterial({ uniforms: shaderUniforms, fragmentShader: fragmentShaderSakura });
            scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material));
            animate(); updateFlow();
        }

        function animate(t) {
            animationFrameId = requestAnimationFrame(animate);
            shaderUniforms.iTime.value = t * 0.001;
            renderer.render(scene, camera);
        }

        function startRecordingAndDownload() {
            const stream = document.getElementById('webgl-canvas').captureStream(30);
            const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            let chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const url = URL.createObjectURL(new Blob(chunks, { type: 'video/webm' }));
                const btn = document.getElementById('download-btn');
                btn.style.display = 'flex'; btn.style.pointerEvents = 'auto';
                btn.onclick = () => { window.open(url); };
            };
            recorder.start();
            setTimeout(() => recorder.stop(), 5000);
        }

        window.onload = initShader;
    </script>
</body>
</html>
