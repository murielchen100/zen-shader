<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Space</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; background: #000; font-family: sans-serif; }
        #webgl-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #ui-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.8); }
        .cloud-box { animation: floatMotion 4s ease-in-out infinite; transition: opacity 0.6s ease, transform 0.6s ease; }
        @keyframes floatMotion { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
    </style>
</head>
<body>

    <canvas id="webgl-canvas"></canvas>
    <div id="ui-container">
        <div id="dialog-card" class="cloud-box bg-white/10 backdrop-blur-xl p-8 rounded-2xl max-w-md w-full text-center text-white border border-white/10 shadow-2xl mx-4">
            <div id="content-area"></div>
        </div>
    </div>

    <script>
        // --- Shader 資源區 ---
        const shaders = {
            sakura: `uniform float iTime; uniform vec2 iResolution; uniform float uStarted; void mainImage(out vec4 f, vec2 c) { if(uStarted < 0.5) { f = vec4(0.0); return; } vec2 uv = (c*2.0-iResolution.xy)/iResolution.y; f = vec4(0.5+0.5*sin(iTime+uv.xyx+vec3(0,2,4)), 1.0); } void main() { mainImage(gl_FragColor, gl_FragCoord.xy); }`,
            wave: `uniform float iTime; uniform vec2 iResolution; uniform float uStarted; void mainImage(out vec4 f, vec2 c) { if(uStarted < 0.5) { f = vec4(0.0); return; } vec2 uv = c/iResolution.xy; f = vec4(0.2, 0.5, 0.8, 1.0) * sin(uv.x*10.0 + iTime); } void main() { mainImage(gl_FragColor, gl_FragCoord.xy); }`,
            leaf: `uniform float iTime; uniform vec2 iResolution; uniform float uStarted; void mainImage(out vec4 f, vec2 c) { if(uStarted < 0.5) { f = vec4(0.0); return; } vec2 uv = (c*2.0-iResolution.xy)/iResolution.y; f = vec4(0.1, 0.6, 0.2, 1.0) * cos(uv.y*5.0 + iTime); } void main() { mainImage(gl_FragColor, gl_FragCoord.xy); }`
        };

        let scene, camera, renderer, material;
        let shaderUniforms = { iTime: { value: 0 }, iResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }, uStarted: { value: 0.0 } };
        let currentStep = 1;

        // --- 核心邏輯 ---
        function updateFlow() {
            const htmlContent = document.getElementById('content-area');
            const cardNode = document.getElementById('dialog-card');
            cardNode.style.opacity = '0';
            setTimeout(() => {
                if(currentStep === 7) {
                    htmlContent.innerHTML = `
                        <h3 class="mb-5">Pick a pattern:</h3>
                        <div class="grid grid-cols-3 gap-4">
                            <button onclick="selectPattern('sakura')" class="text-3xl p-4 bg-white/10 rounded">🌸</button>
                            <button onclick="selectPattern('leaf')" class="text-3xl p-4 bg-white/10 rounded">🌿</button>
                            <button onclick="selectPattern('wave')" class="text-3xl p-4 bg-white/10 rounded">🌊</button>
                        </div>`;
                } else {
                    htmlContent.innerHTML = `<h2 class="text-2xl">Zen Space (Step ${currentStep})</h2><button onclick="currentStep=7;updateFlow();" class="mt-4 p-2 bg-white/20 rounded">Continue</button>`;
                }
                cardNode.style.opacity = '1';
            }, 400);
        }

        function selectPattern(key) {
            material.fragmentShader = shaders[key];
            material.needsUpdate = true;
            shaderUniforms.uStarted.value = 1.0;
            document.getElementById('ui-container').style.display = 'none';
        }

        function init() {
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl-canvas') });
            renderer.setSize(window.innerWidth, window.innerHeight);
            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            material = new THREE.ShaderMaterial({ uniforms: shaderUniforms, fragmentShader: shaders.sakura });
            scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material));
            
            function animate(t) {
                requestAnimationFrame(animate);
                shaderUniforms.iTime.value = t * 0.001;
                renderer.render(scene, camera);
            }
            animate();
            updateFlow();
        }

        window.onload = init;
    </script>
</body>
</html>
